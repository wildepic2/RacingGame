name: Build and Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: RacingGame-linux-${{ github.ref_name }}
            executable_name: RacingGame
          - os: windows-latest
            artifact_name: RacingGame-windows-${{ github.ref_name }}
            executable_name: RacingGame.exe

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    # This step ensures CMake 4.2 is installed regardless of the runner's default
    - name: Setup CMake 4.2
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: 4.2.0

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libx11-dev libxinerama-dev libxcursor-dev libxi-dev libxrandr-dev libgl1-mesa-dev libglu1-mesa-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Prepare Package Folder
      run: |
        mkdir dist
        if [ "${{ runner.os }}" == "Windows" ]; then
          cp build/Release/${{ matrix.executable_name }} dist/
        else
          cp build/${{ matrix.executable_name }} dist/
        fi
        if [ -d "assets" ]; then cp -r assets dist/; fi
      shell: bash

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/

  create-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show Downloaded Artifacts
        run: find artifacts -maxdepth 3 -type f -print

      - name: Zip Downloaded Artifacts
        run: |
          mkdir -p release-files
          
          for dir in artifacts/*; do
            if [ -d "$dir" ]; then
              artifact_name="$(basename "$dir")"
              echo "Zipping $artifact_name"
          
              cd "$dir"
              zip -r "../../release-files/${artifact_name}.zip" .
              cd ../..
            fi
          done
          
          echo "Release files:"
          ls -la release-files

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}